name: Release

on:
  workflow_dispatch:
    inputs:
      verified_sha:
        description: Release branch commit SHA that already passed Tests and Security
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  actions: read
  checks: read
  contents: read
  statuses: read

jobs:
  prepare:
    name: Prepare release artifact
    runs-on: ubuntu-latest
    timeout-minutes: 50
    if: github.event_name == 'workflow_dispatch'
    outputs:
      ready: ${{ steps.final-target.outputs.ready }}
      sha: ${{ steps.checked-commit.outputs.sha }}
    steps:
      - name: Resolve checked commit
        id: checked-commit
        env:
          VERIFIED_SHA_INPUT: ${{ inputs.verified_sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.ref_name }}" != "release" ]; then
            echo "Manual releases must be dispatched from the release branch."
            exit 1
          fi

          if [ -z "$VERIFIED_SHA_INPUT" ]; then
            echo "verified_sha is required. Release must be dispatched after Tests and Security pass."
            exit 1
          fi

          checked_sha="$VERIFIED_SHA_INPUT"
          if [[ ! "$checked_sha" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "Expected a full 40-character release commit SHA, got: $checked_sha"
            exit 1
          fi

          echo "sha=$checked_sha" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: release

      - name: Ensure release points to the checked commit
        id: release-target
        shell: bash
        run: |
          current_sha="$(git rev-parse HEAD)"
          checked_sha="${{ steps.checked-commit.outputs.sha }}"

          if [ "$current_sha" != "$checked_sha" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping release because release moved to $current_sha after workflow started for $checked_sha."
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Confirm release target is still current
        id: final-target
        if: steps.release-target.outputs.ready == 'true'
        shell: bash
        run: |
          git fetch --no-tags origin refs/heads/release
          current_sha="$(git rev-parse FETCH_HEAD)"
          checked_sha="${{ steps.checked-commit.outputs.sha }}"

          if [ "$current_sha" != "$checked_sha" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping release because release moved to $current_sha while checks were running for $checked_sha."
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.final-target.outputs.ready == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies from lockfile
        if: steps.final-target.outputs.ready == 'true'
        run: npm ci --no-audit --no-fund

      - name: Build
        if: steps.final-target.outputs.ready == 'true'
        run: npm run build

      - name: Prepare npm README
        if: steps.final-target.outputs.ready == 'true'
        run: cp docs/README.md README.md

      - name: Verify package contents
        if: steps.final-target.outputs.ready == 'true'
        run: npm pack --dry-run --ignore-scripts

      - name: Upload release artifact
        if: steps.final-target.outputs.ready == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-build-${{ steps.checked-commit.outputs.sha }}
          path: |
            dist
            README.md
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: prepare
    if: needs.prepare.outputs.ready == 'true'
    environment: npm-publish
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Generate release app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-discussions: write
          permission-issues: write
          permission-pull-requests: write

      - name: Checkout verified commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: release
          token: ${{ steps.app-token.outputs.token }}

      - name: Attach release branch
        shell: bash
        run: |
          set -euo pipefail

          git checkout -B release origin/release
          git branch --set-upstream-to=origin/release release

      - name: Configure release app git auth
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail

          user_id="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
          git config --global user.name "${APP_SLUG}[bot]"
          git config --global user.email "${user_id}+${APP_SLUG}[bot]@users.noreply.github.com"
          gh auth setup-git

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install release tooling from lockfile
        env:
          NPM_CONFIG_IGNORE_SCRIPTS: true
        run: npm ci --no-audit --no-fund

      - name: Download verified build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-build-${{ needs.prepare.outputs.sha }}
          path: .

      - name: Ensure release still points to the verified commit
        id: publish-target
        shell: bash
        run: |
          git fetch --no-tags origin refs/heads/release
          current_sha="$(git rev-parse FETCH_HEAD)"
          checked_sha="${{ needs.prepare.outputs.sha }}"

          if [ "$current_sha" != "$checked_sha" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping release because release moved to $current_sha after preparing $checked_sha."
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Publish release
        id: semantic-release
        if: steps.publish-target.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_CONFIG_IGNORE_SCRIPTS: true
        shell: bash
        run: |
          set -euo pipefail

          checked_sha="${{ needs.prepare.outputs.sha }}"
          current_branch="$(git branch --show-current)"

          if [ "${GITHUB_REF_NAME:-}" != "release" ] || [ "${GITHUB_REF:-}" != "refs/heads/release" ]; then
            echo "Release workflow must run with GitHub ref refs/heads/release."
            echo "GITHUB_EVENT_NAME=${GITHUB_EVENT_NAME:-}"
            echo "GITHUB_REF=${GITHUB_REF:-}"
            echo "GITHUB_REF_NAME=${GITHUB_REF_NAME:-}"
            exit 1
          fi

          if [ "$current_branch" != "release" ]; then
            echo "Expected local branch release, got: $current_branch"
            exit 1
          fi

          npm run semantic-release

          git fetch --no-tags origin refs/heads/release
          release_sha="$(git rev-parse FETCH_HEAD)"

          if [ "$release_sha" = "$checked_sha" ]; then
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          release_parent_sha="$(git rev-parse "$release_sha^")"
          if [ "$release_parent_sha" != "$checked_sha" ]; then
            echo "release moved unexpectedly from $checked_sha to $release_sha"
            exit 1
          fi

          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "sha=$release_sha" >> "$GITHUB_OUTPUT"

      - name: Open release metadata sync PR
        if: steps.semantic-release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_SHA: ${{ steps.semantic-release.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail

          version="$(git show "$RELEASE_SHA:package.json" | jq -r .version)"
          existing_pr="$(
            gh pr list \
              --repo "$REPOSITORY" \
              --base master \
              --head release \
              --state open \
              --json number \
              --jq '.[0].number // empty'
          )"

          if [ -z "$existing_pr" ]; then
            gh pr create \
              --repo "$REPOSITORY" \
              --base master \
              --head release \
              --title "chore(release): sync v$version metadata to master" \
              --body "Sync the package version and changelog generated by semantic-release for v$version back to master. Merge this PR with **Create a merge commit** to preserve shared branch history."
          else
            echo "Release metadata sync PR #$existing_pr is already open; its head was updated to $RELEASE_SHA."
          fi
