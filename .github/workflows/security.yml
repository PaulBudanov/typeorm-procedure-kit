name: Security

on:
  pull_request:
    branches:
      - master
      - release
  workflow_run:
    workflows:
      - Tests
    types:
      - completed
    branches:
      - master
      - release
  workflow_dispatch:
    inputs:
      dependency_review_base:
        description: Optional base ref for a manually dispatched dependency review
        required: false
        type: string
      dependency_review_head:
        description: Optional head ref for a manually dispatched dependency review
        required: false
        type: string

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL analysis
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        with:
          category: /language:javascript-typescript

  dependency-audit:
    name: Dependency audit
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Validate committed lockfile
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Audit production dependencies
        run: |
          mkdir -p reports/security
          set +e
          npm audit --omit=dev --audit-level=high --json | tee reports/security/npm-audit-production.json
          audit_exit_code=${PIPESTATUS[0]}
          set -e
          exit "$audit_exit_code"

      - name: Audit complete build dependency graph
        if: always()
        run: |
          set +e
          npm audit --audit-level=critical --json | tee reports/security/npm-audit-build.json
          audit_exit_code=${PIPESTATUS[0]}
          set -e
          exit "$audit_exit_code"

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm-audit-report
          path: reports/security/npm-audit-*.json
          if-no-files-found: ignore

  dependency-review:
    name: Dependency review
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.dependency_review_base != '') ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'release'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5
        with:
          base-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || inputs.dependency_review_base || 'master' }}
          head-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || inputs.dependency_review_head || github.event.workflow_run.head_sha || github.sha }}
          fail-on-severity: moderate
          fail-on-scopes: runtime, development, unknown
          show-openssf-scorecard: true
          warn-on-openssf-scorecard-level: 3
          show-patched-versions: true

  dispatch-release:
    name: Dispatch release
    needs:
      - codeql
      - dependency-audit
      - dependency-review
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'release' &&
      needs.codeql.result == 'success' &&
      needs.dependency-audit.result == 'success' &&
      needs.dependency-review.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch release workflow
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          VERIFIED_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail

          gh workflow run release.yml \
            --repo "$REPOSITORY" \
            --ref release \
            -f verified_sha="$VERIFIED_SHA"
